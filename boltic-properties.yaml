app: "anujbugtest"
serverlessId: "ce200692-ad45-4edd-b63b-f052f7ce51bb"
region: "asia-south1"
handler: "handler.handler"
language: "nodejs/20"

serverlessConfig:
  Name: "anujbugtest"
  Description: ""
  Runtime: "git"
  # Environment variables for your serverless function
  # To add env variables, replace {} with key-value pairs like:
  # Env:
  #   API_KEY: "your-api-key"
  #TO add port map, replace {} with port map like:
  # PortMap:
  #   - Name: "port"
  #     Port: "8080"
  #     Protocol: "http"/"https"
  Env: {}
  PortMap: {}
  Scaling:
    AutoStop: false
    Min: 1
    Max: 1
    MaxIdleTime: 300
  Resources:
    CPU: 0.1
    MemoryMB: 128
    MemoryMaxMB: 128
  Timeout: 60
  Validations: null

build:
  builtin: dockerfile
  ignorefile: .gitignore
