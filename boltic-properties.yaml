app: "fynd-boltic-landing"
serverlessId: "ce200692-ad45-4edd-b63b-f052f7ce51bb"
region: "asia-south1"
handler: "app.js"
language: "nodejs/18"

serverlessConfig:
  Name: "Fynd Boltic Landing Page"
  Description: "Professional AI Workflow Automation landing page"
  Runtime: "docker"
  # Environment variables for your serverless function
  Env:
    NODE_ENV: "production"
    PORT: "8080"
  # Port mapping for HTTP access
  PortMap:
    - Name: "http"
      Port: "8080"
      Protocol: "http"
  Scaling:
    AutoStop: false
    Min: 1
    Max: 1
    MaxIdleTime: 300
  Resources:
    CPU: 0.1
    MemoryMB: 256
    MemoryMaxMB: 512
  Timeout: 60
  Validations: null

build:
  builtin: dockerfile
  ignorefile: .gitignore
